name: Generate weekly article

on:
  schedule:
    - cron: '0 1 * * 1'  # Lundi 8h Bangkok (UTC+7 = 1h UTC)
  workflow_dispatch:       # Bouton manuel dans GitHub pour tester

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Article généré automatiquement"
          title: "📝 Nouvel article — ${{ env.ARTICLE_TITLE }}"
          body: |
            ## Nouvel article généré par Claude

            **Titre :** ${{ env.ARTICLE_TITLE }}
            **Fichier :** ${{ env.ARTICLE_FILE }}

            ### Pour publier :
            ✅ Clique **Merge pull request** si le contenu est bon
            ❌ Clique **Close pull request** pour rejeter

            Netlify déploiera automatiquement dès le merge.
          branch: "article-${{ env.ARTICLE_SLUG }}"
          base: main
