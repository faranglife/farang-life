name: Generate weekly article
on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Debug model name
        run: grep -n "model:" scripts/generate-article.js
      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Article généré automatiquement"
          title: "Article - ${{ env.ARTICLE_TITLE }}"
          body: |
            Clique Merge pour publier, Close pour rejeter.
          branch: "article-${{ env.ARTICLE_SLUG }}"
          base: main
