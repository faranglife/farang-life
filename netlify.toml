[[redirects]]
  from = "/visa"
  to = "/articles/fr/visa-thailande.html"
  status = 301

[[redirects]]
  from = "/assurance"
  to = "/articles/fr/assurance-sante-expatrie-thailande.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
